<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>One-Shot Deviation Principle | ECON 510</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Times New Roman', serif;
      background: #fdf6e3;
      color: #586e75;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem 0.5rem;
    }
    h2 { font-size: 1.3rem; margin-bottom: 0.6rem; }
    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.3rem 1.2rem;
      margin-bottom: 1.5rem;
      width: 100%;
      max-width: 480px;
    }
    .ctrl {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .ctrl label {
      font-style: italic;
      min-width: 1.6em;
      text-align: right;
    }
    .ctrl input[type=range] { flex: 1; min-width: 0; accent-color: #586e75; }
    .ctrl .val {
      font-weight: bold;
      min-width: 2.8em;
      text-align: left;
      font-size: 0.9rem;
    }
    svg { max-width: 520px; width: 100%; display: block; }
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 0.2rem 1.2rem;
      margin-top: -0.3em;
      font-size: 0.85rem;
    }
    .legend-item { display: flex; align-items: center; gap: 0.3rem; }
    .legend-swatch { width: 22px; height: 3px; border-radius: 1px; }
    .info {
      margin-top: 0.5rem;
      font-size: 0.95rem;
      text-align: center;
      min-height: 1.5em;
    }
    .axis-label {
      font-family: 'Times New Roman', serif;
      font-size: 18px;
      font-style: italic;
      fill: #586e75;
    }
    .tick-label {
      font-family: 'Times New Roman', serif;
      font-size: 13px;
      fill: #586e75;
    }
  </style>
</head>
<body>
  <h2>The One-Shot Deviation Principle</h2>

  <div class="controls">
    <div class="ctrl">
      <label>v</label>
      <input type="range" id="sl-v" min="5" max="25" step="0.5" value="10">
      <span class="val" id="vl-v">10</span>
    </div>
    <div class="ctrl">
      <label>p&#x2080;</label>
      <input type="range" id="sl-p0" min="0.5" max="10" step="0.5" value="4">
      <span class="val" id="vl-p0">4</span>
    </div>
    <div class="ctrl">
      <label>&delta;</label>
      <input type="range" id="sl-delta" min="0" max="1000" step="1" value="332">
      <span class="val" id="vl-delta">0.90</span>
    </div>
    <div class="ctrl">
      <label>&kappa;</label>
      <input type="range" id="sl-kappa" min="1.1" max="3.0" step="0.1" value="2.0">
      <span class="val" id="vl-kappa">2.0</span>
    </div>
  </div>

  <svg id="plot" viewBox="0 0 560 420">
    <defs>
      <clipPath id="clip">
        <rect id="clip-rect"/>
      </clipPath>
      <marker id="arr" markerWidth="10" markerHeight="5" refX="9" refY="2.5" orient="auto">
        <polygon points="0 0, 10 2.5, 0 5" fill="#586e75"/>
      </marker>
    </defs>
    <g id="g-grid"></g>
    <g id="g-axes"></g>
    <g id="g-ticks"></g>
    <g id="g-curves" clip-path="url(#clip)"></g>
    <g id="g-dots" clip-path="url(#clip)"></g>
    <g id="g-zstar"></g>
  </svg>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:#d33682"></div><span>f(z)</span></div>
    <div class="legend-item"><div class="legend-swatch" style="background:#dc322f"></div><span>f(z+1)</span></div>
    <div class="legend-item"><div class="legend-swatch" style="background:#268bd2"></div><span>g(z&minus;1)</span></div>
    <div class="legend-item"><div class="legend-swatch" style="background:#2aa198"></div><span>g(z)</span></div>
  </div>

  <div class="info" id="info"></div>

  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  <script>
  (function() {
    // Layout
    const M = { left: 60, right: 20, top: 40, bottom: 50 };
    const VW = 560, VH = 380;
    const PW = VW - M.left - M.right;
    const PH = VH - M.top - M.bottom;

    // Set clip rect
    const cr = document.getElementById('clip-rect');
    cr.setAttribute('x', M.left - 20);
    cr.setAttribute('y', M.top);
    cr.setAttribute('width', PW + 40);
    cr.setAttribute('height', PH + 15);

    // DOM refs
    const gGrid   = document.getElementById('g-grid');
    const gAxes   = document.getElementById('g-axes');
    const gTicks  = document.getElementById('g-ticks');
    const gCurves = document.getElementById('g-curves');
    const gDots   = document.getElementById('g-dots');
    const gZstar  = document.getElementById('g-zstar');
    const info    = document.getElementById('info');

    // Parameters
    let P = { v: 10, p0: 4, delta: 0.9, kappa: 2 };

    // Math
    function computeR(d) {
      return (1 - Math.sqrt(1 - d * d)) / d;
    }

    function fz(z) { return P.v - P.p0 * Math.pow(P.kappa, z); }

    function gz(z) {
      const r = computeR(P.delta);
      return (P.delta / 2) * (P.v - P.p0 * Math.pow(P.kappa, z)) * (1 + r * r);
    }

    function gzm1(z) {
      const r = computeR(P.delta);
      return (P.delta / 2) * (
        (P.v - P.p0 * Math.pow(P.kappa, z - 1)) +
        r * (P.v - P.p0 * Math.pow(P.kappa, z))
      );
    }

    // Four curves: each is a function of z
    const curves = [
      { fn: z => fz(z),     color: '#d33682', width: 3.6 },
      { fn: z => fz(z + 1), color: '#dc322f', width: 3.6 },
      { fn: z => gzm1(z),   color: '#268bd2', width: 3.6 },
      { fn: z => gz(z),     color: '#2aa198', width: 3.6 },
    ];

    // Find optimal z
    function findZStar() {
      const zCross = Math.log(P.v / P.p0) / Math.log(P.kappa);
      const lo = Math.floor(zCross) - 5;
      const hi = Math.ceil(zCross) + 5;
      for (let z = hi; z >= lo; z--) {
        if (fz(z) >= gzm1(z) && fz(z + 1) <= gz(z)) return z;
      }
      return null;
    }

    // Viewport x-axis stays locked until z* leaves view; y-axis always recomputes
    let xView = null; // { zMin, zMax }

    function computeXView(zs) {
      const center = zs !== null ? zs : Math.log(P.v / P.p0) / Math.log(P.kappa);
      return { zMin: Math.floor(center) - 1, zMax: Math.floor(center) + 2 };
    }

    function computeYRange(zMin, zMax) {
      const vals = [];
      for (let z = zMin; z <= zMax; z++) {
        for (const c of curves) {
          const u = c.fn(z);
          if (isFinite(u)) vals.push(u);
        }
      }
      vals.sort((a, b) => a - b);
      const uMin = vals.length > 1 ? vals[1] : vals[0];
      const uMax = vals[vals.length - 1];
      const pad = (uMax - uMin) * 0.12 || 1;
      return { uMin: uMin - pad, uMax: uMax + pad };
    }

    // Nice tick values for y-axis
    function niceTicks(lo, hi, approxCount) {
      const range = hi - lo;
      const rough = range / approxCount;
      const mag = Math.pow(10, Math.floor(Math.log10(rough)));
      const residual = rough / mag;
      let step;
      if (residual <= 1.5) step = mag;
      else if (residual <= 3) step = 2 * mag;
      else if (residual <= 7) step = 5 * mag;
      else step = 10 * mag;
      const ticks = [];
      let t = Math.ceil(lo / step) * step;
      while (t <= hi + step * 0.01) {
        ticks.push(parseFloat(t.toFixed(8)));
        t += step;
      }
      return ticks;
    }

    // SVG helpers
    function svgEl(tag, attrs) {
      const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
      for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
      return el;
    }

    function clearGroup(g) { while (g.firstChild) g.removeChild(g.firstChild); }

    // Render
    function render() {
      clearGroup(gGrid); clearGroup(gAxes); clearGroup(gTicks);
      clearGroup(gCurves); clearGroup(gDots); clearGroup(gZstar);

      const zs = findZStar();

      // Reset x-axis if z* is outside current view (or first render)
      if (!xView || zs === null ||
          zs < xView.zMin || zs > xView.zMax) {
        xView = computeXView(zs);
      }

      const { zMin, zMax } = xView;
      const { uMin, uMax } = computeYRange(zMin, zMax);
      const integers = [];
      for (let z = zMin; z <= zMax; z++) integers.push(z);

      // Coordinate maps
      const toX = z => M.left + (z - zMin) / (zMax - zMin) * PW;
      const toY = u => M.top + PH - (u - uMin) / (uMax - uMin) * PH;

      // Grid lines
      for (const z of integers) {
        const x = toX(z);
        gGrid.appendChild(svgEl('line', {
          x1: x, y1: M.top, x2: x, y2: M.top + PH,
          stroke: '#eee8d5', 'stroke-width': 1
        }));
      }
      const yTicks = niceTicks(uMin, uMax, 6);
      for (const u of yTicks) {
        const y = toY(u);
        gGrid.appendChild(svgEl('line', {
          x1: M.left, y1: y, x2: M.left + PW, y2: y,
          stroke: '#eee8d5', 'stroke-width': 1
        }));
      }

      // Zero line
      if (uMin < 0 && uMax > 0) {
        const y0 = toY(0);
        gGrid.appendChild(svgEl('line', {
          x1: M.left, y1: y0, x2: M.left + PW, y2: y0,
          stroke: '#93a1a1', 'stroke-width': 1, 'stroke-dasharray': '6,4'
        }));
      }

      // Axes
      gAxes.appendChild(svgEl('line', {
        x1: M.left, y1: M.top + PH, x2: M.left + PW + 8, y2: M.top + PH,
        stroke: '#586e75', 'stroke-width': 2, 'marker-end': 'url(#arr)'
      }));
      gAxes.appendChild(svgEl('line', {
        x1: M.left, y1: M.top + PH, x2: M.left, y2: M.top - 8,
        stroke: '#586e75', 'stroke-width': 2, 'marker-end': 'url(#arr)'
      }));

      // Axis labels
      const zlbl = svgEl('text', {
        x: M.left + PW + 12, y: M.top + PH + 5,
        class: 'axis-label', 'text-anchor': 'start'
      });
      zlbl.textContent = 'z';
      gTicks.appendChild(zlbl);

      const ulbl = svgEl('text', {
        x: M.left - 8, y: M.top - 10,
        class: 'axis-label', 'text-anchor': 'middle'
      });
      ulbl.textContent = 'U';
      gTicks.appendChild(ulbl);

      // X ticks
      for (const z of integers) {
        const x = toX(z);
        gTicks.appendChild(svgEl('line', {
          x1: x, y1: M.top + PH, x2: x, y2: M.top + PH + 6,
          stroke: '#586e75', 'stroke-width': 1.5
        }));
        const t = svgEl('text', {
          x: x, y: M.top + PH + 20,
          class: 'tick-label', 'text-anchor': 'middle'
        });
        t.textContent = z;
        gTicks.appendChild(t);
      }

      // Y ticks
      for (const u of yTicks) {
        const y = toY(u);
        gTicks.appendChild(svgEl('line', {
          x1: M.left - 5, y1: y, x2: M.left, y2: y,
          stroke: '#586e75', 'stroke-width': 1.5
        }));
        const t = svgEl('text', {
          x: M.left - 8, y: y + 4,
          class: 'tick-label', 'text-anchor': 'end'
        });
        t.textContent = Math.abs(u) < 1e-10 ? '0' : (Number.isInteger(u) ? u : u.toFixed(1));
        gTicks.appendChild(t);
      }

      // Draw curves (smooth polylines)
      const N = 300;
      const zPad = (zMax - zMin) * 0.15;
      const zLo = zMin - zPad, zHi = zMax + zPad;
      for (const c of curves) {
        let pts = '';
        for (let i = 0; i <= N; i++) {
          const z = zLo + (zHi - zLo) * i / N;
          const u = c.fn(z);
          if (!isFinite(u)) continue;
          const x = toX(z), y = toY(u);
          pts += `${x.toFixed(1)},${y.toFixed(1)} `;
        }
        gCurves.appendChild(svgEl('polyline', {
          points: pts.trim(),
          fill: 'none',
          stroke: c.color,
          'stroke-width': c.width,
          'stroke-linecap': 'round',
          'stroke-linejoin': 'round'
        }));
      }

      // Dots at integer z values
      for (const c of curves) {
        for (const z of integers) {
          const u = c.fn(z);
          if (!isFinite(u)) continue;
          gDots.appendChild(svgEl('circle', {
            cx: toX(z), cy: toY(u), r: 4,
            fill: c.color, stroke: '#fdf6e3', 'stroke-width': 1.5
          }));
        }
      }

      // Optimal z*
      if (zs !== null && zs >= zMin && zs <= zMax) {
        const x = toX(zs);
        gZstar.appendChild(svgEl('line', {
          x1: x, y1: M.top, x2: x, y2: M.top + PH,
          stroke: '#6c71c4', 'stroke-width': 2, 'stroke-dasharray': '8,5', opacity: 0.6
        }));
        // Info text
        const fv  = fz(zs).toFixed(2);
        const gm  = gzm1(zs).toFixed(2);
        const fp1 = fz(zs + 1).toFixed(2);
        const gv  = gz(zs).toFixed(2);
        info.innerHTML =
          `<span style="color:#6c71c4"><em>z</em>* = ${zs}</span>: &ensp;` +
          `<span style="color:#d33682"><em>f</em>(<em>z</em>)</span> = ${fv} &ensp;&ge;&ensp;` +
          `<span style="color:#268bd2"><em>g</em>(<em>z</em>&minus;1)</span> = ${gm} &ensp;&ge;&ensp;` +
          `<span style="color:#2aa198"><em>g</em>(<em>z</em>)</span> = ${gv} &ensp;&ge;&ensp;` +
          `<span style="color:#dc322f"><em>f</em>(<em>z</em>+1)</span> = ${fp1}`;
      } else {
        info.innerHTML = 'No optimal integer <em>z</em> found in range.';
      }
    }

    // Delta log-scale mapping: slider 0–1000 → δ 0.01–0.999
    const LOG_LO = Math.log(1 - 0.01);   // log(0.99)
    const LOG_HI = Math.log(1 - 0.999);  // log(0.001)
    function rawToDelta(raw) {
      const t = raw / 1000;
      return 1 - Math.exp(LOG_LO + t * (LOG_HI - LOG_LO));
    }

    // Slider wiring
    const sliders = [
      { id: 'sl-v',     vl: 'vl-v',     key: 'v',     fmt: v => v },
      { id: 'sl-p0',    vl: 'vl-p0',    key: 'p0',    fmt: v => v },
      { id: 'sl-kappa', vl: 'vl-kappa', key: 'kappa', fmt: v => v.toFixed(1) },
    ];
    for (const s of sliders) {
      const sl = document.getElementById(s.id);
      const vl = document.getElementById(s.vl);
      sl.addEventListener('input', () => {
        P[s.key] = parseFloat(sl.value);
        vl.textContent = s.fmt(P[s.key]);
        render();
      });
    }

    // Delta slider (non-linear)
    const slDelta = document.getElementById('sl-delta');
    const vlDelta = document.getElementById('vl-delta');
    slDelta.addEventListener('input', () => {
      P.delta = rawToDelta(parseFloat(slDelta.value));
      vlDelta.textContent = P.delta < 0.995 ? P.delta.toFixed(2) : P.delta.toFixed(3);
      render();
    });

    render();
  })();
  </script>
</body>
</html>
